<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ابو فانا</title>

<style>
body {
    direction: rtl;
    text-align: center;
    background-color: chartreuse;
    font-family: Arial, sans-serif;
}

#newsBox {
    width: 95%;
    margin: 100px auto;
    overflow: hidden;
    background: linear-gradient(135deg, #4b0f0f, #7a1c1c, #c9a646);
    color: #f5e6c8; 
    border-radius: 14px;
    display: flex;
    align-items: center; /* النص واللوجو في منتصف العمودي */
    justify-content: flex-start; /* يبدأ من جهة اليمين */
    padding: 12px 20px;
    box-shadow: 0 6px 15px rgba(0, 0, 0, 0.35);
    font-family: "Georgia", "Times New Roman", serif;
    font-size: 18px;
    letter-spacing: 1px;
    height: 50px;
    position: relative;
}

#newsBox::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 14px;
    padding: 2px;
    background: linear-gradient(45deg, #d4af37, #fff2b0, #d4af37);
    -webkit-mask: 
        linear-gradient(#000 0 0) content-box, 
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
}

#tickerTrack {
    display: flex;
    white-space: nowrap;
}

.tickerItem {
    display: inline-flex;
    align-items: center; 
    justify-content: center;
    padding: 0 40px;
    font-size: 16px;
    gap: 10px;
}

.logo {
    width: 1.2em;
    height: 1.2em;
    object-fit: contain;
}

.controls {
    margin-top: 20px;
}

input {
    margin: 5px;
    padding: 10px;
    border-radius: 20px;
    border: solid 1px #888;
}

button {
    margin: 5px;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background-color: rgb(0, 255, 51);
    transition: .3s;
    cursor: pointer;
}

button:hover{
    background-color: rgb(0, 207, 41);
    transform: translateY(-2px);
}

.footer-bottom{
    font-family: Georgia, 'Times New Roman', Times, serif;   
    font-size: larger; 
    text-align:center;
    margin-top:25px;
    padding-top:15px;
    border-top:1px solid #333;
    color:#888;
}
</style>

</head>

<body>

<div class="controls">
    <input type="text" id="textInput" placeholder="اكتب الخبر">
    <button onclick="changeText()">تغيير النص</button>
    <br>
    <input type="number" id="speedInput" placeholder="سرعة">
    <button onclick="changeSpeed()">تغيير السرعة</button>
    <br>
    <input type="number" id="heightInput" placeholder="ارتفاع">
    <button onclick="changeHeight()">تغيير الارتفاع</button>
    <br>
    <input type="number" id="fontSizeInput" placeholder="حجم الخط (px)">
    <button onclick="changeFontSize()">تغيير حجم الخط</button>
</div>

<div id="newsBox">
    <div id="tickerTrack">
        <div class="tickerItem" id="content"></div>
    </div>
</div>

<div class="footer-bottom">
 Developed by mafde
</div>

<script>
let track = document.getElementById("tickerTrack");
let content = document.getElementById("content");
let box = document.getElementById("newsBox");

let speed = 1;
let x = 0;
let currentFontSize = 16;
let currentText = "خبر عاجل: أهلاً بك في نشرة الأخبار";

// تحميل البيانات المحفوظة
function loadSettings() {
    if (localStorage.getItem("text")) currentText = localStorage.getItem("text");
    if (localStorage.getItem("speed")) speed = parseFloat(localStorage.getItem("speed"));
    if (localStorage.getItem("fontSize")) currentFontSize = parseFloat(localStorage.getItem("fontSize"));
    if (localStorage.getItem("height")) box.style.height = localStorage.getItem("height") + "px";
}

// حفظ البيانات
function saveSettings() {
    localStorage.setItem("text", currentText);
    localStorage.setItem("speed", speed);
    localStorage.setItem("fontSize", currentFontSize);
    localStorage.setItem("height", box.offsetHeight);
}

// تكرار النص لملء الشريط
function duplicateContent() {
    track.innerHTML = "";

    let html = `
        <img src="final logo.png" class="logo">
        <span>${currentText}</span>
        <img src="final logo.png" class="logo">
    `;

    let totalWidth = 0;
    while(totalWidth < box.offsetWidth * 2) {
        let div = document.createElement("div");
        div.className = "tickerItem";
        div.innerHTML = html;
        div.style.fontSize = currentFontSize + "px";
        track.appendChild(div);
        totalWidth += div.offsetWidth;
    }
}

// الحركة لليمين
function animate() {
    x += speed;
    let first = track.children[0];
    if(first){
        let width = first.offsetWidth;
        if(x >= width){
            track.appendChild(first);
            x -= width;
        }
    }
    track.style.transform = `translateX(${x}px)`;
    requestAnimationFrame(animate);
}

// تغيير النص
function changeText() {
    let text = document.getElementById("textInput").value;
    if(text !== ""){
        currentText = text;
        saveSettings();
        duplicateContent();
    }
}

// تغيير السرعة
function changeSpeed() {
    let s = document.getElementById("speedInput").value;
    if(s > 0){
        speed = parseFloat(s);
        saveSettings();
    }
}

// تغيير الارتفاع
function changeHeight() {
    let h = document.getElementById("heightInput").value;
    if(h > 0){
        box.style.height = h + "px";
        localStorage.setItem("height", h);
    }
}

// تغيير حجم الخط
function changeFontSize() {
    let size = document.getElementById("fontSizeInput").value;
    if(size > 0){
        currentFontSize = parseFloat(size);
        saveSettings();
        duplicateContent();
    }
}

// تشغيل
loadSettings();
duplicateContent();
animate();
</script>

</body>
</html>
