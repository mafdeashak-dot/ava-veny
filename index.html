<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ابو فانا</title>
<link rel="icon" type="image/png" href="logo.jpeg">

<style>
body {
    direction: rtl;
    text-align: center;
    background-color: chartreuse;
    font-family: Arial, sans-serif;
}

/* المناسبات */
.normal #newsBox {
    background: linear-gradient(135deg, #4b0f0f, #7a1c1c, #c9a646);
    color: #f5e6c8;
}
.lent #newsBox {
    background: linear-gradient(135deg,#1b2b3a,#3b4e63,#8fa6c1);
    color:white;
}
.holyweek #newsBox {
    background: linear-gradient(135deg,#000,#111,#444);
    color:white;
}
.easter #newsBox {
    background: linear-gradient(135deg,#fff,#ffd700,#fff8dc);
    color:black;
}
.feast #newsBox {
    background: linear-gradient(135deg,#7a1c1c,#b8860b,#ffd700);
    color:white;
}

/* الحاوية */
#newsContainer {
    width: 95%;
    margin: 100px auto;
    display: flex;
}

/* الساعة */
#clockBox {
    width: 170px;
    background: linear-gradient(135deg,#000,#333);
    color:#fff2b0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    border-radius:0px 14px 14px 0px;
    font-family:Tahoma;
    border:2px solid #d4af37;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.6);
}
#time {
    font-size:25px;
    font-weight:bold;
    direction:ltr;
}

/* شريط الأخبار */
#newsBox {
    flex:1;
    overflow:hidden;
    background: linear-gradient(135deg, #4b0f0f, #7a1c1c, #c9a646);
    color:#f5e6c8;
    border-radius:14px 0px 0px 14px;
    display:flex;
    align-items:center;
    padding:12px 20px;
    font-family:"Georgia", serif;
    border:2px solid #d4af37;
    border-right:none;
}

/* الحركة */
#tickerTrack {
    display:flex;
    white-space:nowrap;
}
.tickerItem {
    display:inline-flex;
    align-items:center;
    padding:0 40px;
    gap:15px;
}

/* اللوجو */
.logo {
    width:2em;
    height:2em;
}

/* التحكم */
.controls {
    margin-top:20px;
}
input,select {
    margin:5px;
    padding:10px;
    border-radius:20px;
    border: solid 1px #888;
}
button {
    margin:5px;
    padding:10px 20px;
    border-radius:20px;
    border:none;
    background-color:rgb(0,225,255);
    cursor:pointer;
    transition:.5s;
}
button:hover {
    transform:translateY(-2px);
    background-color:rgb(0,105,119);
}

/* فوتر */
.footer-bottom {
    margin-top:25px;
    padding-top:15px;
    border-top:1px solid #333;
    color:#888;
}
/* تصغير العناصر للشاشات الصغيرة دون تغيير الترتيب */
@media screen and (max-width: 768px) {
    #clockBox {
        width: 120px;
        font-size: 14px;
    }

    #newsBox {
        font-size: 14px;
        padding: 8px 10px;
    }

    .tickerItem {
        padding: 0 20px;
        gap: 10px;
    }

    #time {
        font-size: 18px;
    }

    .logo {
        width:1.5em;
        height:1.5em;
    }

    .controls input, .controls select, .controls button {
        font-size: 14px;
        padding: 8px;
    }
}

/* تصغير إضافي جدًا للشاشات ≤400px */
@media screen and (max-width: 400px) {
    #clockBox {
        width: 100px;
        font-size: 12px;
    }

    #newsBox {
        font-size: 12px;
        padding: 6px 8px;
    }

    .tickerItem {
        padding: 0 10px;
        gap: 5px;
    }

    #time {
        font-size: 16px;
    }

    .logo {
        width:1.2em;
        height:1.2em;
    }
}
</style>
</head>

<body class="normal">

<div class="controls">

<input type="text" id="textInput" placeholder="اكتب الخبر">
<button onclick="changeText()">تغيير النص</button><br>

<input type="number" id="speedInput" placeholder="سرعة">
<button onclick="changeSpeed()">تغيير السرعة</button><br>

<input type="number" id="heightInput" placeholder="ارتفاع">
<button onclick="changeHeight()">تغيير الارتفاع</button><br>

<input type="number" id="fontSizeInput" placeholder="حجم الخط">
<button onclick="changeFontSize()">تغيير الخط</button><br>

<select id="occasionSelect" onchange="changeOccasion()">
<option value="normal">الوضع العادي</option>
<option value="lent">الصيام</option>
<option value="holyweek">اسبوع الالام</option>
<option value="easter">القيامة</option>
<option value="feast">عيد</option>
</select><br>

<label>لون الشريط:</label>
<input type="color" id="bgColorInput" onchange="changeBgColor()">
<label>لون الخط:</label>
<input type="color" id="textColorInput" onchange="changeTextColor()"><br>

<button onclick="toggleClock()">إظهار / إخفاء الساعة</button>

</div>

<div id="newsContainer">

<div id="clockBox">
    <div id="time"></div>
</div>

<div id="newsBox">
    <div id="tickerTrack">
        <div class="tickerItem" id="content"></div>
    </div>
</div>

</div>

<div class="footer-bottom">
Developed by mafde
</div>

<script>
let track=document.getElementById("tickerTrack");
let box=document.getElementById("newsBox");
let clockBox=document.getElementById("clockBox");

let speed=1;
let x=0;
let currentFontSize=16;
let currentOccasion="normal";
let currentText="قداس احد الشعانين 2026 بكنيسة القديس العظيم ابو فانا والانبا ابرام";

// تحميل الإعدادات من localStorage
function loadSettings(){
    if(localStorage.getItem("text")) currentText=localStorage.getItem("text");
    if(localStorage.getItem("speed")) speed=parseFloat(localStorage.getItem("speed"));
    if(localStorage.getItem("fontSize")) currentFontSize=parseFloat(localStorage.getItem("fontSize"));
    if(localStorage.getItem("height")) box.style.height=localStorage.getItem("height")+"px";
    if(localStorage.getItem("occasion")){
        currentOccasion=localStorage.getItem("occasion");
        document.body.className=currentOccasion;
        document.getElementById("occasionSelect").value=currentOccasion;
    }
    if(localStorage.getItem("clockVisible")==="false") {
        clockBox.style.display="none";
        box.style.borderRadius="14px"; 
        box.style.borderRight="2px solid #d4af37"; 
    }
    if(localStorage.getItem("bgColor")){
        box.style.background = localStorage.getItem("bgColor");
        document.getElementById("bgColorInput").value = localStorage.getItem("bgColor");
    }
    if(localStorage.getItem("textColor")){
        box.style.color = localStorage.getItem("textColor");
        document.getElementById("textColorInput").value = localStorage.getItem("textColor");
    }
}

// حفظ الإعدادات
function saveSettings(){
    localStorage.setItem("text",currentText);
    localStorage.setItem("speed",speed);
    localStorage.setItem("fontSize",currentFontSize);
    localStorage.setItem("height",box.offsetHeight);
}

// تغيير المناسبة مع تطبيق ألوانها دائمًا
function changeOccasion(){
    let value=document.getElementById("occasionSelect").value;
    document.body.className=value;
    localStorage.setItem("occasion",value);

    // تطبيق ألوان المناسبة مباشرة
    switch(value){
        case "normal": 
            box.style.background="linear-gradient(135deg, #4b0f0f, #7a1c1c, #c9a646)";
            box.style.color="#f5e6c8";
            break;
        case "lent": 
            box.style.background="linear-gradient(135deg,#1b2b3a,#3b4e63,#8fa6c1)";
            box.style.color="white";
            break;
        case "holyweek": 
            box.style.background="linear-gradient(135deg,#000,#111,#444)";
            box.style.color="white";
            break;
        case "easter": 
            box.style.background="linear-gradient(135deg,#fff,#ffd700,#fff8dc)";
            box.style.color="black";
            break;
        case "feast": 
            box.style.background="linear-gradient(135deg,#7a1c1c,#b8860b,#ffd700)";
            box.style.color="white";
            break;
    }

    // إزالة أي لون مخصص سابق
    localStorage.removeItem("bgColor");
    localStorage.removeItem("textColor");
    document.getElementById("bgColorInput").value = "";
    document.getElementById("textColorInput").value = "";
}

// التحكم في الساعة وتصحيح البوردير
function toggleClock(){
    if(clockBox.style.display==="none"){
        clockBox.style.display="flex";
        box.style.borderRadius="14px 0px 0px 14px"; 
        box.style.borderRight="none"; 
        localStorage.setItem("clockVisible","true");
    }else{
        clockBox.style.display="none";
        box.style.borderRadius="14px"; 
        box.style.borderRight="2px solid #d4af37"; 
        localStorage.setItem("clockVisible","false");
    }
}

// تكرار المحتوى لشريط الأخبار
function duplicateContent(){
    track.innerHTML="";
    let html=`<img src="final logo.png" class="logo"><span>${currentText}</span><img src="final logo.png" class="logo">`;
    let totalWidth=0;
    while(totalWidth < box.offsetWidth * 2){
        let div=document.createElement("div");
        div.className="tickerItem";
        div.innerHTML=html;
        div.style.fontSize=currentFontSize+"px";
        track.appendChild(div);
        totalWidth+=div.offsetWidth;
    }
}

// حركة الشريط
function animate(){
    x+=speed;
    let first=track.children[0];
    if(first){
        let width=first.offsetWidth;
        if(x>=width){
            track.appendChild(first);
            x-=width;
        }
    }
    track.style.transform=`translateX(${x}px)`;
    requestAnimationFrame(animate);
}

// التحكم في النص
function changeText(){
    let text=document.getElementById("textInput").value;
    if(text!==""){
        currentText=text;
        saveSettings();
        duplicateContent();
    }
}

// التحكم في السرعة
function changeSpeed(){
    let s=document.getElementById("speedInput").value;
    if(s>0){
        speed=parseFloat(s);
        saveSettings();
    }
}

// التحكم في ارتفاع الشريط
function changeHeight(){
    let h=document.getElementById("heightInput").value;
    if(h>0){
        box.style.height=h+"px";
        localStorage.setItem("height",h);
    }
}

// التحكم في حجم الخط
function changeFontSize(){
    let size=document.getElementById("fontSizeInput").value;
    if(size>0){
        currentFontSize=parseFloat(size);
        saveSettings();
        duplicateContent();
    }
}

// تغيير لون الشريط
function changeBgColor(){
    let color=document.getElementById("bgColorInput").value;
    box.style.background=color;
    localStorage.setItem("bgColor",color);
}

// تغيير لون الخط
function changeTextColor(){
    let color=document.getElementById("textColorInput").value;
    box.style.color=color;
    localStorage.setItem("textColor",color);
}

// تحديث الساعة
function updateClock(){
    let now=new Date();
    let time=now.toLocaleTimeString("en-US");
    document.getElementById("time").innerText=time;
}

// تشغيل كل الوظائف
loadSettings();
duplicateContent();
animate();
updateClock();
setInterval(updateClock,1000);

</script>

</body>
</html>
